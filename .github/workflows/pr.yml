name: PR

on:
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.26", "1.25"]
        directory: ["./v3"]
    name: Go ${{ matrix.go }}.x PR Validate ${{ matrix.directory }} (Modules)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Version
        run: go version

      - name: Setup local directory server
        run: make local-server

      - name: Build, Validate, and Test
        run: |
          cd ${{ matrix.directory }}
          go vet .
          go test -v -cover -race -count=1 .
          go build .

      - name: Build, Validate, and Test (FIPS)
        run: |
          cd ${{ matrix.directory }}
          go vet -tags requirefips .
          go test -tags requirefips -v -count=1 .
          go build -tags requirefips .

      - name: Verify FIPS dependency graph
        run: |
          cd ${{ matrix.directory }}
          DEPS=$(go list -tags requirefips -deps ./...)

          # These packages must never appear in a requirefips build — fail if they do.
          FORBIDDEN="github.com/Azure/go-ntlmssp"
          # TODO: add the following once gokrb5 RC4-HMAC enctype support is gated:
          # golang.org/x/crypto/md4
          # golang.org/x/crypto/rc4

          for pkg in $FORBIDDEN; do
            if echo "$DEPS" | grep -qx "$pkg"; then
              echo "FAIL: non-FIPS package present in requirefips build: $pkg"
              exit 1
            fi
          done
          echo "FIPS dependency check passed"
